<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PetQuest – Trainer Profile</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
          background: linear-gradient(135deg, #FF8C42, #FFB77A);
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          color: white;
          text-align: center;
          padding: 24px;
        }
        .card {
          background: rgba(255,255,255,0.15);
          border-radius: 24px;
          padding: 40px 32px;
          max-width: 360px;
          width: 100%;
          backdrop-filter: blur(8px);
        }
        .paw { font-size: 56px; margin-bottom: 16px; }
        h1 { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
        p  { font-size: 15px; opacity: 0.85; margin-bottom: 28px; line-height: 1.5; }
        .btn {
          display: inline-block;
          background: white;
          color: #FF8C42;
          font-weight: 700;
          font-size: 16px;
          padding: 14px 32px;
          border-radius: 50px;
          text-decoration: none;
          margin-bottom: 12px;
          width: 100%;
        }
        .sub { font-size: 12px; opacity: 0.70; margin-top: 8px; }
    </style>
</head>
<body>
<div class="card">
    <div class="paw">🐾</div>
    <h1>PetQuest</h1>
    <p>Someone shared their Trainer Profile with you.<br>Open the app to view their live stats!</p>
    <a class="btn" id="openBtn" href="#">Open in PetQuest</a>
    <div class="sub" id="status">Opening PetQuest…</div>
</div>

<script>
    // Read uid from ?uid=xxx query param
    const params = new URLSearchParams(window.location.search);
    const uid    = params.get("uid") || "";

    const deepLink = "petquest://share?uid=" + encodeURIComponent(uid);
    document.getElementById("openBtn").href = deepLink;

    // Auto-redirect immediately
    if (uid) {
      window.location.href = deepLink;

      // If the app isn't installed the redirect silently fails.
      // After 2 seconds show a helpful message.
      setTimeout(function () {
        document.getElementById("status").textContent =
          "App not installed? Search "PetQuest" in the Play Store.";
      }, 2000);
    } else {
      document.getElementById("status").textContent = "Invalid link – no profile ID found.";
    }
</script>
</body>
</html>
