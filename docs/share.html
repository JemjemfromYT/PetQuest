<!DOCTYPE html>
<!--
╔══════════════════════════════════════════════════════════════════════════════╗
║  ⚠️  SYNC CONTRACT — READ BEFORE EDITING  ⚠️                                ║
║                                                                              ║
║  This file is the WEBSITE version of the Trainer Profile.                   ║
║  It must stay 100% in sync with the app's Trainer Profile views:            ║
║    • ProfileScreen.kt  → Profile tab (owner's own profile)                  ║
║    • SharedProfileScreen.kt → shared/public Trainer Profile view            ║
║                                                                              ║
║  RULES — if you change one, change all:                                     ║
║   1. ONLY verified pets are shown (isVerified === true / pet.isVerified)     ║
║   2. Pet count header = verified-only count                                  ║
║   3. Card FRONT:  photo (or species emoji) + rarity bar + name + rarity      ║
║         chip + Lv.N  — NO tier star or level badge                           ║
║   4. Card BACK:   virtue image (large) + bond status + virtue title          ║
║         — NO LV.XX badge on back; animated aura/rings are app-only           ║
║   5. Bond status / title thresholds must match bondInfo() in this file       ║
║         and the app's earnedTitle / bondStatus logic in SharedProfileScreen  ║
║   6. Achievements categories & titles must match ACHIEV_CATEGORIES here      ║
║         and the app's achievement definitions                                ║
║   7. Species-collected count and total (29) must match PetType.entries.size ║
╚══════════════════════════════════════════════════════════════════════════════╝
-->
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PetQuest – Trainer Profile</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg:#0f1525;--card:#1a2035;--card2:#141b2d;
            --or:#f97316;--or2:#fb923c;--txm:#94a3b8;
        }
        body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center}

        /* Loading */
        #loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;height:100vh;width:100%}
        .spin{width:40px;height:40px;border:4px solid rgba(249,115,22,.3);border-top-color:var(--or);border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        #load-status{font-size:14px;color:var(--txm)}

        /* Error */
        #error{display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;height:100vh;width:100%;text-align:center;padding:24px}
        #error h2{font-size:20px;font-weight:700}
        #errmsg{font-size:14px;color:var(--txm)}

        #profile{display:none;width:100%;max-width:480px;padding-bottom:48px}

        /* Top bar */
        .topbar{background:linear-gradient(135deg,var(--or),var(--or2));padding:18px 20px}
        .topbar-title{font-size:20px;font-weight:900;color:#fff;letter-spacing:-.2px}

        /* Trainer hero */
        .trainer-hero{background:var(--card2);padding:20px;display:flex;align-items:center;gap:16px;position:relative}
        .trainer-avatar{width:64px;height:64px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--or),var(--or2));display:flex;align-items:center;justify-content:center;position:relative}
        .trainer-avatar img{width:30px;height:30px;object-fit:contain;filter:brightness(0) invert(1)}
        .trainer-lvbadge{position:absolute;bottom:-2px;right:-2px;background:#7c3aed;color:#fff;border-radius:50%;width:22px;height:22px;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid var(--card2)}
        .trainer-name{font-size:22px;font-weight:800;color:#fff}
        .trainer-sub{font-size:13px;color:var(--txm);margin-top:3px}

        /* Stats strip — always visible above tabs */
        .stats-strip{padding:14px 14px 0;display:flex;flex-direction:column;gap:10px}

        /* Level card */
        .lvcard{background:linear-gradient(135deg,var(--or),#ea580c);border-radius:16px;padding:16px 18px;display:flex;align-items:center;gap:14px}
        .lvcard-icon{width:48px;height:48px;background:rgba(255,255,255,.22);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .lvcard-icon img{width:24px;height:24px;object-fit:contain;filter:brightness(0) invert(1)}
        .lvcard-body{flex:1}
        .lvcard-title{font-size:26px;font-weight:900;color:#fff;letter-spacing:-.5px;line-height:1.1}
        .lvcard-sub{font-size:11px;color:rgba(255,255,255,.85);margin-top:3px;margin-bottom:8px;display:flex;justify-content:space-between}
        .lvbar-wrap{background:rgba(255,255,255,.25);border-radius:99px;height:5px}
        .lvbar{height:5px;border-radius:99px;background:#fff;transition:width .5s}

        /* Mini stats row */
        .mini-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
        .mini-stat{background:var(--card);border-radius:12px;padding:12px 10px;text-align:center}
        .mini-stat-val{font-size:20px;font-weight:900}
        .mini-stat-lbl{font-size:10px;font-weight:600;color:var(--txm);margin-top:2px}
        .mini-stat.bond  .mini-stat-val{color:#22c55e}
        .mini-stat.pets  .mini-stat-val{color:#a855f7}
        .mini-stat.streak .mini-stat-val{color:#f97316}

        /* Species bar */
        .sp-card{background:linear-gradient(135deg,#14532d,#166534);border-radius:12px;padding:13px 16px}
        .sp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
        .sp-head-left{display:flex;align-items:center;gap:7px}
        .sp-head-left img{width:16px;height:16px;object-fit:contain;filter:brightness(0) invert(1)}
        .sp-title{font-size:13px;font-weight:800;color:#fff}
        .sp-count{font-size:12px;font-weight:700;color:#fff;background:rgba(255,255,255,.15);padding:3px 10px;border-radius:99px}
        .spbar-wrap{background:rgba(255,255,255,.25);border-radius:99px;height:5px}
        .spbar{height:5px;border-radius:99px;background:#fff;transition:width .5s}

        /* Tab nav */
        .tab-nav{position:sticky;top:0;z-index:10;background:var(--bg);padding:12px 14px 0;border-bottom:1px solid rgba(255,255,255,.06)}
        .tab-nav-inner{display:flex;gap:4px;background:var(--card2);border-radius:12px;padding:4px}
        .tab-btn{flex:1;padding:9px 6px;border:none;background:transparent;color:var(--txm);font-size:12px;font-weight:700;border-radius:9px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:3px;letter-spacing:.01em}
        .tab-btn .tab-icon{font-size:16px;line-height:1}
        .tab-btn.active{background:var(--or);color:#fff;box-shadow:0 2px 10px rgba(249,115,22,.4)}

        /* Tab panels */
        .tab-panel{display:none;padding:14px 14px 0;flex-direction:column;gap:12px}
        .tab-panel.active{display:flex}

        /* My Pets panel */
        .pets-header{display:flex;align-items:baseline;gap:8px;margin-bottom:2px}
        .pets-title{font-size:17px;font-weight:800;color:#fff}
        .pets-hint{font-size:12px;color:var(--txm);margin-bottom:10px}
        .pets-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .pets-empty{text-align:center;padding:40px 20px;color:var(--txm);font-size:14px;line-height:1.6}

        /* Flip card */
        .flip-wrap{perspective:1000px;height:220px;cursor:pointer}
        .flip-inner{position:relative;width:100%;height:100%;transition:transform .6s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d}
        .flip-wrap.flipped .flip-inner{transform:rotateY(180deg)}
        .flip-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:14px;overflow:hidden}
        .flip-back{transform:rotateY(180deg)}

        /* Pet card front */
        .pet-front{background:var(--card);display:flex;flex-direction:column}
        .pet-photo{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:var(--card2)}
        .pet-photo-placeholder{width:100%;aspect-ratio:1;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:48px}
        .pet-rarity-bar{height:5px;width:100%;flex-shrink:0}
        .pet-info{padding:10px 12px 12px}
        .pet-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:8px}
        .pet-row{display:flex;align-items:center;justify-content:space-between}
        .pet-rarity-chip{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px}
        .pet-lv{font-size:13px;font-weight:800}

        /* Pet card back */
        .pet-back{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;overflow:hidden}
        .virtue-img{width:88px;height:88px;object-fit:contain;margin-bottom:18px;filter:drop-shadow(0 0 14px rgba(255,255,255,.2))}
        .virtue-status{color:rgba(255,255,255,.7);font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px}
        .virtue-title{color:#fff;font-size:20px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}

        /* Achievements panel */
        .section-head{display:flex;align-items:center;justify-content:space-between}
        .section-title{font-size:17px;font-weight:800;color:#fff}
        .count-pill{font-size:11px;font-weight:800;padding:4px 12px;border-radius:99px;background:rgba(249,168,37,.18);color:#F9A825;border:1px solid rgba(249,168,37,.3)}
        .ach-cat-block{background:var(--card);border-radius:14px;padding:14px 14px 10px}
        .ach-cat-row{display:flex;align-items:center;gap:7px;margin-bottom:10px}
        .ach-cat-icon{font-size:17px}
        .ach-cat-name{font-size:13px;font-weight:800;flex:1}
        .ach-cat-count{font-size:11px;font-weight:700;color:var(--txm)}
        .ach-chips{display:flex;flex-wrap:wrap;gap:6px}
        .ach-chip{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:6px 10px;border-radius:10px}
        .empty-state{text-align:center;padding:40px 20px}
        .empty-state p{color:var(--txm);font-size:14px;line-height:1.7}

        /* Events panel */
        .ev-count-pill{background:var(--or);color:#fff;border-radius:99px;padding:3px 12px;font-size:12px;font-weight:700}
        .ev-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .ev-item{background:var(--card);border:1px solid rgba(249,115,22,.18);border-radius:14px;padding:18px 14px;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center}
        .ev-emoji{font-size:34px;line-height:1}
        .ev-name{color:#fb923c;font-weight:800;font-size:12px;line-height:1.3}
        .ev-type{color:var(--txm);font-size:11px;font-weight:500}

        /* CTA */
        .cta-footer{background:var(--card);border-radius:14px;padding:18px;text-align:center;margin:14px 14px 0}
        .cta-msg{font-size:14px;font-weight:600;margin-bottom:14px;color:#aaa}
        .openbtn{display:block;width:100%;background:#4CAF50;color:#fff;font-size:16px;font-weight:800;text-align:center;padding:16px;border-radius:14px;text-decoration:none}
        .shint{font-size:12px;color:var(--txm);margin-top:10px}
    </style>
</head>
<body>

<div id="loading">
    <div class="spin"></div>
    <p>Loading trainer profile...</p>
    <p id="load-status"></p>
</div>
<div id="error">
    <h2>Profile not found</h2>
    <div id="errmsg"></div>
</div>
<div id="profile"></div>

<script>
    const SUPABASE_URL      = 'https://aktoowoflxvniphzgpvx.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFrdG9vd29mbHh2bmlwaHpncHZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NjU2NTQsImV4cCI6MjA5ODI0MTY1NH0.5YQ1E3F6aQK_gcBSGaQATherncEY4m1Diqio-sUwMMw';

    const ICON_BASE   = 'https://jemjemfromyt.github.io/PetQuest/icons/';
    const VIRTUE_BASE = 'https://raw.githubusercontent.com/JemjemfromYT/PetQuest/master/app/src/main/res/drawable/';

    const VIRTUE_CFG = {
        wisdom:     { img: VIRTUE_BASE+'wisdom.png',     gradient:'linear-gradient(135deg,#1a3a7c,#2563eb)' },
        courage:    { img: VIRTUE_BASE+'courage.png',    gradient:'linear-gradient(135deg,#7f1d1d,#b91c1c)' },
        diligence:  { img: VIRTUE_BASE+'diligence.png',  gradient:'linear-gradient(135deg,#78490a,#d97706)' },
        temperance: { img: VIRTUE_BASE+'temperance.png', gradient:'linear-gradient(135deg,#064e3b,#059669)' },
        compassion: { img: VIRTUE_BASE+'compassion.png', gradient:'linear-gradient(135deg,#831843,#ec4899)' },
    };
    const VIRTUE_FALLBACK = ['wisdom','diligence','temperance','compassion','courage'];

    const KNOWN_EVENT_BADGES = new Set([
        'New Year Celebrant','Beloved Keeper','Lucky Lantern Holder',
        'Easter Hatchling','Sun Keeper','Pumpkin Master','Festive Keeper'
    ]);
    const EVENT_BADGE_EMOJI = {
        'New Year Celebrant':'🎊','Beloved Keeper':'💝','Lucky Lantern Holder':'🏮',
        'Easter Hatchling':'🐣','Sun Keeper':'☀️','Pumpkin Master':'🎃','Festive Keeper':'🎄'
    };

    const ACHIEV_CATEGORIES = [
        { label:'First Steps',     icon:'🐾', color:'#2E7D32', bg:'rgba(46,125,50,.12)',
          titles:['First Pet','First Verification','Pet Lover','Own 5 Pets','Own 10 Pets','Verify 3 Pets','Verify 5 Pets','Verify 10 Pets'] },
        { label:'Streak',          icon:'🔥', color:'#E65100', bg:'rgba(230,81,0,.12)',
          titles:['3-Day Streak','7-Day Streak','14-Day Streak','30-Day Streak','60-Day Streak','100-Day Streak'] },
        { label:'Tasks',           icon:'✅', color:'#1565C0', bg:'rgba(21,101,192,.12)',
          titles:['Complete 10 Tasks','Complete 25 Tasks','Complete 50 Tasks','Complete 100 Tasks','Complete 250 Tasks','Complete 500 Tasks'] },
        { label:'Bond Points',     icon:'⭐', color:'#F9A825', bg:'rgba(249,168,37,.12)',
          titles:['Earn 100 Bond Points','Earn 250 Bond Points','Earn 500 Bond Points','Earn 1000 Bond Points','Earn 2500 Bond Points','Earn 5000 Bond Points'] },
        { label:'Pet Bond Level',  icon:'🏆', color:'#6A1B9A', bg:'rgba(106,27,154,.12)',
          titles:['Bond Master','Bond Veteran','Level 10 Companion','Virtue Master','Dedicated Caregiver','Elite Trainer'] },
        { label:'Trainer Level',   icon:'🌟', color:'#BF360C', bg:'rgba(191,54,12,.12)',
          titles:['Reach Level 10','Reach Level 20','Reach Level 30','Reach Level 50'] },
        { label:'Species & Rarity',icon:'🧭', color:'#00695C', bg:'rgba(0,105,92,.12)',
          titles:['Species Collector','Animal Explorer','Master Explorer','Rarity Hunter','Epic Tamer'] },
    ];

    function rarityColor(r) {
        switch((r||'').toUpperCase()) {
            case 'COMMON':    return '#9E9E9E';
            case 'UNCOMMON':  return '#22c55e';
            case 'RARE':      return '#3b82f6';
            case 'EPIC':      return '#a855f7';
            case 'LEGENDARY': return '#f97316';
            default:          return '#9E9E9E';
        }
    }

    function bondInfo(bondLevel) {
        const lv = bondLevel ?? 1;
        let earned;
        if      (lv >= 50) earned = 'Eternal Companion';
        else if (lv >= 40) earned = 'Soul Bonded';
        else if (lv >= 30) earned = 'Elite Protector';
        else if (lv >= 25) earned = 'Bonded Guardian';
        else if (lv >= 20) earned = 'Master Companion';
        else if (lv >= 15) earned = 'Lifelong Partner';
        else if (lv >= 10) earned = 'Loyal Friend';
        else if (lv >= 5)  earned = 'Trusted Companion';
        else               earned = 'New Companion';
        const words = earned.split(' ');
        return words.length >= 2
            ? { status: words[0], title: words.slice(1).join(' ').toUpperCase() }
            : { status: '',       title: earned.toUpperCase() };
    }

    function speciesEmoji(s) {
        const m={'DOG':'🐶','CAT':'🐱','RABBIT':'🐰','HAMSTER':'🐹','BIRD':'🐦',
                 'FISH':'🐟','TURTLE':'🐢','SNAKE':'🐍','LIZARD':'🦎','PARROT':'🦜',
                 'HEDGEHOG':'🦔','FOX':'🦊','HORSE':'🐴','COW':'🐄'};
        return m[(s||'').toUpperCase()] || '🐾';
    }

    const loadEl    = document.getElementById('loading');
    const statusEl  = document.getElementById('load-status');
    const errorEl   = document.getElementById('error');
    const errMsg    = document.getElementById('errmsg');
    const profileEl = document.getElementById('profile');

    function showError(msg) {
        loadEl.style.display  = 'none';
        errorEl.style.display = 'flex';
        errMsg.textContent    = msg;
    }

    const params = new URLSearchParams(window.location.search);
    const uid    = params.get('uid');
    if (!uid) { showError('No trainer ID in link.'); throw new Error('No uid'); }

    async function fetchProfile(uid) {
        const res = await fetch(
            `${SUPABASE_URL}/rest/v1/profiles?uid=eq.${encodeURIComponent(uid)}&select=*`,
            { headers:{'apikey':SUPABASE_ANON_KEY,'Content-Type':'application/json'} }
        );
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const rows = await res.json();
        return rows && rows.length > 0 ? rows[0] : null;
    }

    (async () => {
        try {
            statusEl.textContent = 'Fetching profile…';
            const data = await fetchProfile(uid);
            if (!data) { showError("This trainer hasn't set up their profile yet."); return; }
            render(data, uid);
        } catch(e) {
            showError(e.message || 'Failed to load profile.');
        }
    })();

    function render(data, profileUid) {
        loadEl.style.display    = 'none';
        profileEl.style.display = 'block';

        const name         = data.trainer_name  || 'Trainer';
        const level        = data.level         ?? 1;
        const bondPoints   = data.bond_points   ?? 0;
        const speciesCount = data.species_count ?? 0;
        const streak       = data.streak        ?? 0;
        const totalSpecies = 29;

        const allPets       = Array.isArray(data.pets) ? data.pets : [];
        const pets          = allPets.filter(p => p.isVerified === true);
        const verifiedCount = pets.length;

        const kpInLevel = bondPoints % 100;
        const lvPct     = Math.round((kpInLevel / 100) * 100);
        const spPct     = Math.min(100, Math.round((speciesCount / totalSpecies) * 100));

        const allBadgeTitles = Array.isArray(data.unlocked_badge_titles) ? data.unlocked_badge_titles : [];
        const badgeSet       = new Set(allBadgeTitles);
        const eventBadges    = allBadgeTitles.filter(t => KNOWN_EVENT_BADGES.has(t));

        const groupedAchievs = ACHIEV_CATEGORIES
            .map(cat => ({ cat, earned: cat.titles.filter(t => badgeSet.has(t)) }))
            .filter(g => g.earned.length > 0);
        const totalUnlocked = groupedAchievs.reduce((n,g) => n + g.earned.length, 0);

        document.title = `${name} – PetQuest`;

        /* ── Pet cards ─────────────────────────────────────────────────────── */
        const petCardsHtml = pets.length === 0
            ? `<div class="pets-empty">🐾<br><br>No verified pets yet.</div>`
            : `<div class="pets-grid">
                ${pets.map((pet, idx) => {
                    const rc     = rarityColor(pet.rarity);
                    const emoji  = speciesEmoji(pet.species);
                    const photo  = pet.photoUri;
                    const rarity = pet.rarity
                        ? pet.rarity.charAt(0).toUpperCase() + pet.rarity.slice(1).toLowerCase()
                        : '';
                    const bond   = bondInfo(pet.bondLevel);
                    const vKey   = (pet.virtue||'').toLowerCase();
                    const vc     = VIRTUE_CFG[vKey] || VIRTUE_CFG[VIRTUE_FALLBACK[idx % VIRTUE_FALLBACK.length]];
                    const lvColor = pet.rarity?.toUpperCase() === 'RARE'      ? '#60a5fa'
                                  : pet.rarity?.toUpperCase() === 'EPIC'      ? '#c084fc'
                                  : pet.rarity?.toUpperCase() === 'LEGENDARY' ? '#fb923c'
                                  : '#f59e0b';
                    return `
                    <div class="flip-wrap" onclick="this.classList.toggle('flipped')" id="flip-${idx}">
                        <div class="flip-inner">
                            <div class="flip-face pet-front">
                                ${photo
                                    ? `<img class="pet-photo" src="${photo}" alt="${pet.name||'Pet'}"
                                           onerror="this.outerHTML='<div class=\\'pet-photo-placeholder\\'>${emoji}</div>'">`
                                    : `<div class="pet-photo-placeholder">${emoji}</div>`}
                                <div class="pet-rarity-bar" style="background:${rc}"></div>
                                <div class="pet-info">
                                    <div class="pet-name">${pet.name||'Unknown'}</div>
                                    <div class="pet-row">
                                        <span class="pet-rarity-chip" style="background:${rc}22;color:${rc}">${rarity}</span>
                                        <span class="pet-lv" style="color:${lvColor}">Lv.${pet.bondLevel??1}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="flip-face flip-back pet-back" style="background:${vc.gradient}">
                                <img class="virtue-img" src="${vc.img}" alt="virtue">
                                <div class="virtue-status">${bond.status}</div>
                                <div class="virtue-title">${bond.title}</div>
                            </div>
                        </div>
                    </div>`;
                }).join('')}
               </div>`;

        /* ── Achievements content ───────────────────────────────────────────── */
        const achContentHtml = groupedAchievs.length === 0
            ? `<div class="empty-state"><p>No achievements unlocked yet.<br>Complete tasks and care for your pets to earn badges!</p></div>`
            : groupedAchievs.map(g => `
                <div class="ach-cat-block">
                    <div class="ach-cat-row">
                        <span class="ach-cat-icon">${g.cat.icon}</span>
                        <span class="ach-cat-name" style="color:${g.cat.color}">${g.cat.label}</span>
                        <span class="ach-cat-count">${g.earned.length}</span>
                    </div>
                    <div class="ach-chips">
                        ${g.earned.map(t => `
                            <div class="ach-chip" style="background:${g.cat.bg};color:${g.cat.color}">
                                ${g.cat.icon} ${t}
                            </div>`).join('')}
                    </div>
                </div>`).join('');

        /* ── Events content ─────────────────────────────────────────────────── */
        const evContentHtml = eventBadges.length === 0
            ? `<div class="empty-state"><p>No event badges yet.<br>Complete seasonal challenges to earn exclusive badges.</p></div>`
            : `<div class="ev-grid">
                ${eventBadges.map(b => `
                    <div class="ev-item">
                        <span class="ev-emoji">${EVENT_BADGE_EMOJI[b]||'🏅'}</span>
                        <div class="ev-name">${b}</div>
                        <div class="ev-type">Seasonal Badge</div>
                    </div>`).join('')}
               </div>`;

        const deepLink = `petquest://share?uid=${encodeURIComponent(profileUid)}`;

        profileEl.innerHTML = `
            <div class="topbar"><span class="topbar-title">Trainer Profile</span></div>

            <div class="trainer-hero">
                <div class="trainer-avatar">
                    <img src="${ICON_BASE}paw.png" alt="paw">
                    <div class="trainer-lvbadge">${level}</div>
                </div>
                <div>
                    <div class="trainer-name">${name}</div>
                    <div class="trainer-sub">PetQuest Trainer</div>
                </div>
            </div>

            <div class="stats-strip">
                <div class="lvcard">
                    <div class="lvcard-icon"><img src="${ICON_BASE}paw.png" alt="paw"></div>
                    <div class="lvcard-body">
                        <div class="lvcard-title">Level ${level}</div>
                        <div class="lvcard-sub">
                            <span>KP to next level</span>
                            <span>${kpInLevel} / 100</span>
                        </div>
                        <div class="lvbar-wrap"><div class="lvbar" style="width:${lvPct}%"></div></div>
                    </div>
                </div>

                <div class="mini-stats">
                    <div class="mini-stat bond">
                        <div class="mini-stat-val">${bondPoints.toLocaleString()}</div>
                        <div class="mini-stat-lbl">Bond Pts</div>
                    </div>
                    <div class="mini-stat pets">
                        <div class="mini-stat-val">${verifiedCount}</div>
                        <div class="mini-stat-lbl">Pets</div>
                    </div>
                    <div class="mini-stat streak">
                        <div class="mini-stat-val">${streak}</div>
                        <div class="mini-stat-lbl">Day Streak</div>
                    </div>
                </div>

                <div class="sp-card">
                    <div class="sp-head">
                        <div class="sp-head-left">
                            <img src="${ICON_BASE}explore.png" alt="species">
                            <span class="sp-title">Species Collected</span>
                        </div>
                        <span class="sp-count">${speciesCount} / ${totalSpecies}</span>
                    </div>
                    <div class="spbar-wrap"><div class="spbar" style="width:${spPct}%"></div></div>
                </div>
            </div>

            <div class="tab-nav">
                <div class="tab-nav-inner">
                    <button class="tab-btn active" onclick="switchTab('pets',this)">
                        <span class="tab-icon">🐾</span>My Pets
                    </button>
                    <button class="tab-btn" onclick="switchTab('achievements',this)">
                        <span class="tab-icon">🏆</span>Achievements
                    </button>
                    <button class="tab-btn" onclick="switchTab('events',this)">
                        <span class="tab-icon">🎉</span>Events
                    </button>
                </div>
            </div>

            <div class="tab-panel active" id="panel-pets">
                <div>
                    <div class="pets-header">
                        <div class="pets-title">My Pets (${verifiedCount})</div>
                    </div>
                    <div class="pets-hint">Tap a card to see its virtue</div>
                </div>
                ${petCardsHtml}
            </div>

            <div class="tab-panel" id="panel-achievements">
                <div class="section-head">
                    <div class="section-title">Achievements</div>
                    ${totalUnlocked > 0 ? `<span class="count-pill">${totalUnlocked} unlocked</span>` : ''}
                </div>
                ${achContentHtml}
            </div>

            <div class="tab-panel" id="panel-events">
                <div class="section-head">
                    <div class="section-title">Event Badges</div>
                    ${eventBadges.length > 0 ? `<span class="ev-count-pill">${eventBadges.length}</span>` : ''}
                </div>
                ${evContentHtml}
            </div>

            <div class="cta-footer">
                <p class="cta-msg">Get PetQuest to start your own journey!</p>
                <a class="openbtn" href="${deepLink}">Open in PetQuest</a>
                <p class="shint">Don't have the app? Search "PetQuest" in the Play Store.</p>
            </div>
        `;
    }

    function switchTab(tab, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('panel-' + tab).classList.add('active');
    }
</script>
</body>
</html>
