<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta property="og:title" content="PetQuest Trainer Profile" />
    <meta property="og:description" content="Check out this PetQuest trainer!" />
    <meta property="og:type" content="website" />
    <title>PetQuest Trainer Profile</title>

    <script type="module">
        // ============================================================
        // PASTE YOUR FIREBASE CONFIG HERE
        // (copy it from your old share.html)
        // ============================================================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
          apiKey: "YOUR_API_KEY",
          authDomain: "YOUR_AUTH_DOMAIN",
          databaseURL: "YOUR_DATABASE_URL",
          projectId: "YOUR_PROJECT_ID",
          storageBucket: "YOUR_STORAGE_BUCKET",
          messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
          appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db  = getDatabase(app);

        // Local PNG icon paths (icons/ folder sits next to share.html)
        const IC = {
          paw:      "icons/paw.png",
          star:     "icons/star.png",
          flame:    "icons/flame.png",
          heart:    "icons/heart.png",
          trophy:   "icons/trophy.png",
          compass:  "icons/compass.png",
          lock:     "icons/lock.png",
          check:    "icons/check.png",
          camera:   "icons/camera.png",
          shield:   "icons/shield.png",
          bolt:     "icons/bolt.png",
          bookmark: "icons/bookmark.png",
          explore:  "icons/explore.png",
          pets:     "icons/pets.png",
          medal:    "icons/medal.png",
        };

        function ic(key, size) {
          const s = size || 28;
          return `<img src="${IC[key] || IC.paw}" width="${s}" height="${s}" alt="" />`;
        }

        // ─── ACHIEVEMENT DEFINITIONS ─────────────────────────────────
        const ACHIEVEMENT_CATEGORIES = [
          {
            name: "First Steps", color: "#4CAF50",
            badges: [
              { title: "First Pet",          icon: "paw"      },
              { title: "First Verification", icon: "camera"   },
              { title: "Pet Lover",          icon: "heart"    },
              { title: "Own 5 Pets",         icon: "pets"     },
              { title: "Own 10 Pets",        icon: "pets"     },
              { title: "Verify 3 Pets",      icon: "camera"   },
              { title: "Verify 5 Pets",      icon: "camera"   },
              { title: "Verify 10 Pets",     icon: "camera"   },
            ]
          },
          {
            name: "Explorer", color: "#FF9800",
            badges: [
              { title: "Collector",          icon: "bookmark" },
              { title: "Species Hunter",     icon: "explore"  },
              { title: "5 Species",          icon: "compass"  },
              { title: "10 Species",         icon: "compass"  },
              { title: "15 Species",         icon: "compass"  },
              { title: "20 Species",         icon: "compass"  },
            ]
          },
          {
            name: "Trainer", color: "#9C27B0",
            badges: [
              { title: "Dedicated Trainer",  icon: "paw"     },
              { title: "Level 5",            icon: "star"    },
              { title: "Level 10",           icon: "star"    },
              { title: "Level 20",           icon: "star"    },
              { title: "Level 50",           icon: "star"    },
              { title: "Bond Master",        icon: "heart"   },
              { title: "100 Bond Points",    icon: "heart"   },
              { title: "500 Bond Points",    icon: "heart"   },
            ]
          },
          {
            name: "Streak", color: "#F44336",
            badges: [
              { title: "3 Day Streak",       icon: "flame"   },
              { title: "7 Day Streak",       icon: "flame"   },
              { title: "14 Day Streak",      icon: "flame"   },
              { title: "30 Day Streak",      icon: "flame"   },
              { title: "60 Day Streak",      icon: "flame"   },
              { title: "100 Day Streak",     icon: "flame"   },
            ]
          },
          {
            name: "Tasks", color: "#2196F3",
            badges: [
              { title: "Task Starter",       icon: "check"   },
              { title: "10 Tasks Done",      icon: "check"   },
              { title: "50 Tasks Done",      icon: "check"   },
              { title: "100 Tasks Done",     icon: "check"   },
              { title: "Consistent",         icon: "bolt"    },
            ]
          },
          {
            name: "Social", color: "#00BCD4",
            badges: [
              { title: "Profile Shared",     icon: "shield"  },
              { title: "Community Member",   icon: "shield"  },
              { title: "Event Participant",  icon: "trophy"  },
              { title: "Event Champion",     icon: "medal"   },
            ]
          },
        ];

        // ─── HELPERS ─────────────────────────────────────────────────
        function getLevelTitle(level) {
          if (level >= 50) return "Legendary Trainer";
          if (level >= 30) return "Master Trainer";
          if (level >= 20) return "Expert Trainer";
          if (level >= 10) return "Advanced Trainer";
          if (level >= 5)  return "Skilled Trainer";
          if (level >= 3)  return "Rising Trainer";
          return "Beginner Trainer";
        }
        function rarityColor(virtue) {
          return ({ WISDOM:"#9C27B0",COURAGE:"#F44336",KINDNESS:"#E91E63",
                    LOYALTY:"#2196F3",CURIOSITY:"#FF9800",JOY:"#FFEB3B" }
          )[(virtue||"").toUpperCase()] || "#4CAF50";
        }
        function rarityLabel(rarity) {
          return ({ COMMON:{label:"Common",color:"#9E9E9E"},
                    UNCOMMON:{label:"Uncommon",color:"#4CAF50"},
                    RARE:{label:"Rare",color:"#2196F3"},
                    EPIC:{label:"Epic",color:"#9C27B0"},
                    LEGENDARY:{label:"Legendary",color:"#FF9800"} }
          )[(rarity||"").toUpperCase()] || {label:rarity||"Common",color:"#9E9E9E"};
        }
        function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

        // ─── LOADER ──────────────────────────────────────────────────
        function withTimeout(promise, ms) {
          return Promise.race([
            promise,
            new Promise((_, rej) => setTimeout(() => rej(new Error("__timeout__")), ms))
          ]);
        }

        window.addEventListener("DOMContentLoaded", async () => {
          const uid = new URLSearchParams(location.search).get("uid");
          if (!uid) {
            showErr("No trainer ID found in this link.\nAsk the trainer to share their profile again from the app.");
            return;
          }

          // Try every path the app might write to
          const paths = [
            `shared_profiles/${uid}`,
            `users/${uid}/profile`,
            `users/${uid}`,
            `profiles/${uid}`,
          ];

          let data = null;

          for (const path of paths) {
            try {
              const snap = await withTimeout(get(ref(db, path)), 8000);
              if (snap && snap.exists()) { data = snap.val(); break; }
            } catch (e) {
              if (e.message === "__timeout__") {
                showErr(
                  "Connection timed out.\n\n" +
                  "This usually means the Firebase config in share.html is wrong " +
                  "(check databaseURL), or your internet is offline."
                );
                return;
              }
              // Permission denied or other — try next path
              console.warn("path", path, e.message);
            }
          }

          if (!data) {
            showErr(
              "Profile not found for this link.\n\n" +
              "This happens when:\n" +
              "• App data was cleared (creates a new ID — old links stop working)\n" +
              "• Profile was never shared from the app after the clear\n\n" +
              "Fix: Open PetQuest → Share Profile again to get a fresh link."
            );
            return;
          }

          render(data);
        });

        // ─── RENDER ──────────────────────────────────────────────────
        function render(d) {
          document.getElementById("loading").style.display = "none";
          const root = document.getElementById("profile");
          root.style.display = "block";

          const name         = d.name           || "Trainer";
          const level        = d.level          || 1;
          const streak       = d.streak         || d.dayStreak        || 0;
          const bond         = d.bondPoints      || d.totalBondPoints  || 0;
          const pets         = Array.isArray(d.pets) ? d.pets : [];
          const petsCount    = pets.length || d.petsCount || d.activePets || 0;
          const species      = d.speciesCount   || d.speciesCollected || 0;
          const totalSp      = d.totalSpecies   || 29;
          const xpCur        = d.xpCurrent      || d.xp              || 0;
          const xpNext       = d.xpToNext       || level * 100;
          const unlocked     = new Set(d.unlockedBadgeTitles || []);
          const photo        = d.profilePhotoUrl || d.photoUri        || null;
          const eventBadges  = Array.isArray(d.eventBadges) ? d.eventBadges : [];

          document.title = `${name}'s PetQuest Profile`;
          document.querySelector('[property="og:title"]').content = `${name} — PetQuest Trainer`;
          document.querySelector('[property="og:description"]').content =
            `Level ${level} • ${unlocked.size} achievements • ${petsCount} pet${petsCount!==1?"s":""}`;

          const xpPct = Math.min(100,(xpCur/Math.max(xpNext,1))*100).toFixed(1);
          const spPct = Math.min(100,(species/Math.max(totalSp,1))*100).toFixed(1);

          root.innerHTML = `

            <div class="header">
              <div class="hbrand">
                ${ic("paw",22)}
                <span class="htitle">PETQUEST</span>
              </div>
              <div class="lvlbadge">Lv. ${level}</div>
            </div>

            <div class="avatar-section">
              <div class="avwrap">
                ${photo
                  ? `<img class="avimg" src="${esc(photo)}" alt="${esc(name)}" />`
                  : `<div class="avph">${ic("paw",44)}</div>`}
                <div class="pct-badge">${petsCount}</div>
              </div>
              <h1 class="tname">${esc(name)}</h1>
              <p class="tsub">${esc(getLevelTitle(level))}</p>
            </div>

            <div class="lvlcard">
              <div class="lvlcard-icon">${ic("paw",30)}</div>
              <div class="lvlcard-info">
                <div class="lvlcard-num">Level ${level}</div>
                <div class="lvlcard-sub"><span>XP to next level</span><span>${xpCur} / ${xpNext}</span></div>
                <div class="xpbg"><div class="xpfill" style="width:${xpPct}%"></div></div>
              </div>
            </div>

            <div class="stats-grid">
              <div class="scard sc-streak">
                ${ic("flame",34)}
                <div class="sval" style="color:#FF7043">${streak}</div>
                <div class="slbl">DAY STREAK</div>
              </div>
              <div class="scard sc-bond">
                ${ic("heart",34)}
                <div class="sval" style="color:#E91E63">${bond}</div>
                <div class="slbl">BOND POINTS</div>
              </div>
              <div class="scard sc-level">
                ${ic("star",34)}
                <div class="sval" style="color:#FFC107">${level}</div>
                <div class="slbl">LEVEL</div>
              </div>
              <div class="scard sc-pets">
                ${ic("paw",34)}
                <div class="sval" style="color:#4CAF50">${petsCount}</div>
                <div class="slbl">PETS</div>
              </div>
            </div>

            <div class="spcard">
              <div class="sprow">
                <div class="splbl">${ic("compass",20)} Species Collected</div>
                <div class="spct">${species} / ${totalSp}</div>
              </div>
              <div class="spbarbg"><div class="spbarfill" style="width:${spPct}%"></div></div>
            </div>

            <div class="seccard">
              <div class="sechead">${ic("trophy",20)}<span class="sectitle">Event Badges</span></div>
              ${eventBadges.length===0
                ? `<p class="empty">No event badges earned yet.</p>`
                : `<div class="evbadges">${eventBadges.map(b=>`<div class="evbadge">${ic("trophy",18)}<span>${esc(b.name||b)}</span></div>`).join("")}</div>`}
            </div>

            ${pets.length>0?`
            <div class="petssec">
              <div class="petshead">My Pets (${pets.length})</div>
              <div class="petsgrid">
                ${pets.map(pet=>{
                  const rc=rarityColor(pet.virtue), rl=rarityLabel(pet.rarity);
                  return `<div class="petcard" style="border-color:${rc}55">
                    ${pet.photoUri
                      ? `<img class="petphoto" src="${esc(pet.photoUri)}" alt="${esc(pet.name||"Pet")}" />`
                      : `<div class="petphph">${ic("paw",36)}</div>`}
                    <div class="petinfo">
                      <div class="petname">${esc(pet.name||"Pet")}</div>
                      <div class="petmeta">
                        <span class="raritybadge" style="background:${rl.color}22;color:${rl.color}">${rl.label}</span>
                        <span class="petlvl" style="color:${rc}">Lv.${pet.level||1}</span>
                      </div>
                    </div>
                  </div>`;
                }).join("")}
              </div>
            </div>` : ""}

            <div class="achsec">
              <div class="achhead">
                <div class="achtitle">${ic("trophy",22)} Achievements</div>
                ${unlocked.size>0?`<span class="ulbadge">${unlocked.size} unlocked</span>`:""}
              </div>
              ${ACHIEVEMENT_CATEGORIES.map(cat=>{
                const cnt=cat.badges.filter(b=>unlocked.has(b.title)).length;
                return `<div class="achcat">
                  <div class="achcathead" style="border-left-color:${cat.color}">
                    <span>${cat.name}</span>
                    <span class="achcnt" style="color:${cat.color}">${cnt}/${cat.badges.length}</span>
                  </div>
                  <div class="achgrid">
                    ${cat.badges.map(badge=>{
                      const ul=unlocked.has(badge.title);
                      return `<div class="achbadge ${ul?"ul":"lk"}">
                        <div class="achicon" style="${ul?`background:${cat.color}22;border:1.5px solid ${cat.color}44`:""}">
                          ${ic(ul?badge.icon:"lock", 28)}
                        </div>
                        <div class="achtxt">${esc(badge.title)}</div>
                        ${ul
                          ? `<div class="achst ul-st">${ic("check",10)} UNLOCKED</div>`
                          : `<div class="achst lk-st">LOCKED</div>`}
                      </div>`;
                    }).join("")}
                  </div>
                </div>`;
              }).join("")}
            </div>

            <div class="openapp">
              <a class="openbtn" href="intent://petquest#Intent;scheme=petquest;package=com.example.petquest;end">
                Open in PetQuest
              </a>
              <p class="storehint">Don't have PetQuest? Search "PetQuest" on the Play Store.</p>
            </div>
          `;
        }

        function showErr(msg){
          document.getElementById("loading").style.display="none";
          const el=document.getElementById("error");
          el.style.display="flex";
          // preserve newlines
          document.getElementById("errmsg").innerHTML=msg.replace(/\n/g,"<br/>");
        }
    </script>

    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
          --or:#E8943A;--ord:#C4722A;--gr:#4CAF50;--grd:#2E7D32;
          --bg:#121218;--card:#1E1E2A;--card2:#252532;
          --tx:#fff;--txs:#B0B0C0;--txm:#6B6B80;--r:16px;
        }
        html,body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh}
        body{display:flex;justify-content:center;padding:0 0 48px}
        #root{width:100%;max-width:420px}

        /* loading */
        #loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px}
        .spin{width:48px;height:48px;border:4px solid #333;border-top-color:var(--or);border-radius:50%;animation:sp .8s linear infinite}
        @keyframes sp{to{transform:rotate(360deg)}}
        #loading p{color:var(--txs);font-size:15px}

        /* error */
        #error{display:none;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:12px;padding:32px;text-align:center}
        #error h2{font-size:20px}
        #errmsg{color:var(--txs);font-size:14px;line-height:1.5}

        #profile{display:none}

        /* header */
        .header{background:linear-gradient(135deg,var(--or),var(--ord));padding:18px 20px 22px;display:flex;align-items:center;justify-content:space-between}
        .hbrand{display:flex;align-items:center;gap:8px}
        .htitle{font-size:18px;font-weight:800;color:#fff;letter-spacing:2px}
        .lvlbadge{background:rgba(255,255,255,.25);border:1.5px solid rgba(255,255,255,.5);color:#fff;font-size:14px;font-weight:700;padding:4px 12px;border-radius:20px}

        /* avatar */
        .avatar-section{background:linear-gradient(180deg,var(--ord),var(--bg));display:flex;flex-direction:column;align-items:center;padding:24px 20px 28px;gap:8px}
        .avwrap{position:relative;width:90px;height:90px}
        .avimg{width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,.8)}
        .avph{width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.2);border:3px solid rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center}
        .pct-badge{position:absolute;bottom:2px;right:2px;background:var(--or);color:#fff;font-size:11px;font-weight:700;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg)}
        .tname{font-size:26px;font-weight:800;color:#fff}
        .tsub{font-size:13px;color:rgba(255,255,255,.75);font-weight:500}

        /* level card */
        .lvlcard{background:linear-gradient(135deg,var(--or),#D4752A);margin:0 16px 12px;border-radius:var(--r);padding:18px;display:flex;align-items:center;gap:16px}
        .lvlcard-icon{background:rgba(255,255,255,.2);border-radius:12px;padding:11px;flex-shrink:0;display:flex}
        .lvlcard-info{flex:1}
        .lvlcard-num{font-size:24px;font-weight:800;color:#fff}
        .lvlcard-sub{font-size:12px;color:rgba(255,255,255,.8);margin:2px 0 8px;display:flex;justify-content:space-between;font-weight:500}
        .xpbg{background:rgba(255,255,255,.3);border-radius:4px;height:6px;overflow:hidden}
        .xpfill{background:#fff;height:100%;border-radius:4px}

        /* stats */
        .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 16px 12px}
        .scard{border-radius:var(--r);padding:18px 14px 14px;display:flex;flex-direction:column;align-items:center;gap:5px}
        .sc-streak{background:#2A1A0A}.sc-bond{background:#1A0A14}.sc-level{background:#1A1A08}.sc-pets{background:#0A1A10}
        .sval{font-size:28px;font-weight:800;line-height:1}
        .slbl{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--txm);font-weight:600}

        /* species */
        .spcard{background:var(--grd);margin:0 16px 12px;border-radius:var(--r);padding:16px 18px}
        .sprow{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
        .splbl{display:flex;align-items:center;gap:8px;color:#fff;font-weight:700;font-size:15px}
        .spct{background:rgba(255,255,255,.2);color:#fff;font-size:13px;font-weight:700;padding:3px 10px;border-radius:12px}
        .spbarbg{background:rgba(0,0,0,.25);border-radius:4px;height:6px;overflow:hidden}
        .spbarfill{background:rgba(255,255,255,.7);height:100%;border-radius:4px}

        /* section card */
        .seccard{background:var(--card);margin:0 16px 12px;border-radius:var(--r);padding:16px 18px}
        .sechead{display:flex;align-items:center;gap:10px;margin-bottom:10px}
        .sectitle{font-size:16px;font-weight:700}
        .empty{color:var(--txm);font-size:13px}
        .evbadges{display:flex;flex-wrap:wrap;gap:8px}
        .evbadge{background:var(--card2);border-radius:10px;padding:8px 12px;display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600}

        /* pets */
        .petssec{margin:0 16px 12px}
        .petshead{font-size:17px;font-weight:700;margin-bottom:12px}
        .petsgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
        .petcard{background:var(--card);border-radius:var(--r);border:1.5px solid transparent;overflow:hidden}
        .petphoto{width:100%;aspect-ratio:1;object-fit:cover;display:block}
        .petphph{width:100%;aspect-ratio:1;background:var(--card2);display:flex;align-items:center;justify-content:center}
        .petinfo{padding:10px 10px 12px;display:flex;flex-direction:column;gap:5px}
        .petname{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .petmeta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
        .raritybadge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.5px}
        .petlvl{font-size:12px;font-weight:700}

        /* achievements */
        .achsec{margin:0 16px 12px;background:var(--card);border-radius:var(--r);padding:18px 16px}
        .achhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
        .achtitle{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:800}
        .ulbadge{background:rgba(232,148,58,.15);color:var(--or);font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;border:1px solid rgba(232,148,58,.35)}
        .achcat{margin-bottom:20px}
        .achcat:last-child{margin-bottom:0}
        .achcathead{display:flex;align-items:center;justify-content:space-between;padding-left:10px;border-left:3px solid;margin-bottom:10px}
        .achcathead>span:first-child{font-size:14px;font-weight:700}
        .achcnt{font-size:12px;font-weight:700}
        .achgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
        .achbadge{background:var(--card2);border-radius:12px;padding:12px 10px 10px;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center}
        .achbadge.lk{opacity:.4}
        .achicon{width:48px;height:48px;border-radius:12px;background:var(--card);display:flex;align-items:center;justify-content:center}
        .achtxt{font-size:11px;font-weight:700;line-height:1.3}
        .achst{font-size:9px;font-weight:700;letter-spacing:.5px;display:flex;align-items:center;gap:3px}
        .ul-st{color:#4CAF50}.lk-st{color:var(--txm)}

        /* open in app */
        .openapp{margin:8px 16px 0;display:flex;flex-direction:column;align-items:center;gap:8px}
        .openbtn{display:block;width:100%;background:var(--or);color:#fff;text-align:center;text-decoration:none;font-size:16px;font-weight:700;padding:16px;border-radius:28px}
        .storehint{font-size:12px;color:var(--txm);text-align:center}
    </style>
</head>
<body>
<div id="root">
    <div id="loading">
        <div class="spin"></div>
        <p>Loading trainer profile...</p>
    </div>
    <div id="error">
